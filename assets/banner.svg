<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD6EE"/>
      <stop offset="55%" stop-color="#F3B8E8"/>
      <stop offset="100%" stop-color="#C9A6EE"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFDF5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFDF5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9C9EA"/>
      <stop offset="100%" stop-color="#E7A9E0"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect width="900" height="260" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#FFFFFF">
    <circle cx="70" cy="40" r="2.2"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="80" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="35" r="1.8"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="330" cy="60" r="1.4"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="600" cy="45" r="1.8"><animate attributeName="opacity" values="1;0.3;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="30" r="1.4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="70" r="2"><animate attributeName="opacity" values="1;0.2;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="40" r="1.6"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- moon -->
  <circle cx="800" cy="55" r="46" fill="url(#moonGlow)"/>
  <circle cx="800" cy="55" r="24" fill="#FFFBF0"/>
  <circle cx="811" cy="47" r="20" fill="url(#sky)"/>

  <!-- clouds -->
  <g fill="#FFFFFF" opacity="0.55">
    <ellipse cx="120" cy="120" rx="55" ry="14"/>
    <ellipse cx="160" cy="112" rx="35" ry="11"/>
    <ellipse cx="500" cy="100" rx="60" ry="13"/>
    <ellipse cx="545" cy="94" rx="34" ry="10"/>
  </g>

  <!-- distant hill -->
  <path d="M0,220 Q150,175 300,210 T600,205 T900,215 L900,260 L0,260 Z" fill="url(#hill)"/>

  <!-- mushrooms -->
  <g>
    <ellipse cx="90" cy="222" rx="16" ry="10" fill="#FF6FB5"/>
    <circle cx="80" cy="222" r="2" fill="#FFF"/>
    <circle cx="98" cy="219" r="2" fill="#FFF"/>
    <rect x="84" y="222" width="10" height="14" rx="4" fill="#FFF3F8"/>
  </g>
  <g>
    <ellipse cx="820" cy="230" rx="20" ry="12" fill="#B679E0"/>
    <circle cx="808" cy="230" r="2.3" fill="#FFF"/>
    <circle cx="830" cy="226" r="2.3" fill="#FFF"/>
    <rect x="812" y="230" width="12" height="16" rx="5" fill="#FFF3F8"/>
  </g>

  <!-- butterflies -->
  <g filter="url(#soft)">
    <g transform="translate(260,150)">
      <g>
        <ellipse cx="-6" cy="-4" rx="9" ry="6" fill="#FF9AD1"/>
        <ellipse cx="6" cy="-4" rx="9" ry="6" fill="#FFC2E4"/>
        <ellipse cx="-5" cy="5" rx="6" ry="4" fill="#FFC2E4"/>
        <ellipse cx="5" cy="5" rx="6" ry="4" fill="#FF9AD1"/>
        <line x1="0" y1="-8" x2="0" y2="8" stroke="#8B3A62" stroke-width="1.4"/>
        <animateTransform attributeName="transform" type="scale" values="1,1;0.7,1;1,1" dur="1.3s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="translate(650,175) scale(0.8)">
      <g>
        <ellipse cx="-6" cy="-4" rx="9" ry="6" fill="#C9A6EE"/>
        <ellipse cx="6" cy="-4" rx="9" ry="6" fill="#E6C9F5"/>
        <ellipse cx="-5" cy="5" rx="6" ry="4" fill="#E6C9F5"/>
        <ellipse cx="5" cy="5" rx="6" ry="4" fill="#C9A6EE"/>
        <line x1="0" y1="-8" x2="0" y2="8" stroke="#5C2E6E" stroke-width="1.4"/>
        <animateTransform attributeName="transform" type="scale" values="1,1;0.65,1;1,1" dur="1.1s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
  </g>

  <!-- sparkles -->
  <g fill="#FFFFFF">
    <path d="M400,50 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 z"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></path>
    <path d="M470,140 l2.5,6 l6,2.5 l-6,2.5 l-2.5,6 l-2.5,-6 l-6,-2.5 l6,-2.5 z"><animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/></path>
  </g>

  <!-- title -->
  <text x="450" y="140" text-anchor="middle" font-family="'Brush Script MT','Segoe Script',cursive" font-size="64" fill="#7A2E5C" opacity="0.95">Aarna</text>
  <text x="450" y="170" text-anchor="middle" font-family="Georgia, serif" font-size="16" letter-spacing="3" fill="#6B2F55">FULL-STACK DEVELOPER</text>
</svg>
