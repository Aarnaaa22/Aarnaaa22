<svg width="900" height="56" viewBox="0 0 900 56" xmlns="http://www.w3.org/2000/svg">
  <line x1="0" y1="28" x2="900" y2="28" stroke="#F3AED2" stroke-width="1.4" stroke-dasharray="2,7"/>

  <g id="motifs">
    <!-- mushroom -->
    <g transform="translate(120,28)">
      <ellipse cx="0" cy="-4" rx="10" ry="6" fill="#FF6FB5"/>
      <circle cx="-6" cy="-5" r="1.4" fill="#FFF"/>
      <circle cx="5" cy="-6" r="1.4" fill="#FFF"/>
      <rect x="-5" y="-4" width="10" height="9" rx="3.5" fill="#FFEAF5"/>
    </g>
    <!-- star -->
    <g transform="translate(255,28)" fill="#C9A6EE">
      <path d="M0,-10 l3,7 l7,0 l-5.5,4.5 l2,7 l-6.5,-4.5 l-6.5,4.5 l2,-7 l-5.5,-4.5 l7,0 z"/>
    </g>
    <!-- butterfly -->
    <g transform="translate(390,28)">
      <ellipse cx="-5" cy="-3" rx="7" ry="5" fill="#FF9AD1"/>
      <ellipse cx="5" cy="-3" rx="7" ry="5" fill="#FFC2E4"/>
      <ellipse cx="-4" cy="4" rx="5" ry="3.4" fill="#FFC2E4"/>
      <ellipse cx="4" cy="4" rx="5" ry="3.4" fill="#FF9AD1"/>
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#8B3A62" stroke-width="1.2"/>
    </g>
    <!-- heart -->
    <g transform="translate(525,28)" fill="#FF6FB5">
      <path d="M0,7 C-9,0 -9,-8 -3,-8 C0,-8 0,-5 0,-5 C0,-5 0,-8 3,-8 C9,-8 9,0 0,7 Z"/>
    </g>
    <!-- flower -->
    <g transform="translate(660,28)">
      <circle cx="0" cy="-6" r="3.4" fill="#F3AED2"/>
      <circle cx="6" cy="-2" r="3.4" fill="#F3AED2"/>
      <circle cx="4" cy="6" r="3.4" fill="#F3AED2"/>
      <circle cx="-4" cy="6" r="3.4" fill="#F3AED2"/>
      <circle cx="-6" cy="-2" r="3.4" fill="#F3AED2"/>
      <circle cx="0" cy="0" r="3" fill="#FFD97A"/>
    </g>
    <!-- sparkle -->
    <g transform="translate(795,28)" fill="#B679E0">
      <path d="M0,-9 l2.6,6.4 l6.4,2.6 l-6.4,2.6 l-2.6,6.4 l-2.6,-6.4 l-6.4,-2.6 l6.4,-2.6 z"/>
    </g>
  </g>
</svg>
